<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flydata邮件发布系统 - 登录</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1><i class="fas fa-paper-plane"></i> Flydata</h1>
        <p>邮件发布系统</p>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">登录</div>
        <div class="auth-tab" data-tab="register">注册</div>
      </div>

      <!-- 登录表单 -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label class="form-label" for="loginEmail">
            <i class="fas fa-envelope"></i> 邮箱地址
          </label>
          <input type="email" id="loginEmail" class="form-input" placeholder="请输入邮箱地址" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">
            <i class="fas fa-lock"></i> 密码
          </label>
          <div class="password-input-wrapper">
            <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码" required>
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <i class="fas fa-sign-in-alt"></i> 登录
        </button>
      </form>

      <!-- 注册表单 -->
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="registerEmail">
            <i class="fas fa-envelope"></i> 邮箱地址
          </label>
          <input type="email" id="registerEmail" class="form-input" placeholder="请输入邮箱地址" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="registerPassword">
            <i class="fas fa-lock"></i> 密码
          </label>
          <div class="password-input-wrapper">
            <input type="password" id="registerPassword" class="form-input" placeholder="请设置密码（至少6位）" required minlength="6">
            <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <p class="form-hint">密码长度至少为6个字符</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">
            <i class="fas fa-lock"></i> 确认密码
          </label>
          <div class="password-input-wrapper">
            <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入密码" required>
            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <i class="fas fa-user-plus"></i> 注册
        </button>
      </form>
    </div>
  </div>

  <!-- 引入依赖库 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>

  <!-- 引入自定义脚本 -->
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
