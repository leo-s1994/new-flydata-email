<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flydata邮件发布系统</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.snow.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-paper-plane"></i> Flydata</h2>
      </div>

      <nav class="sidebar-menu">
        <div class="menu-item active" data-panel="compose">
          <i class="fas fa-edit"></i>
          <span>写信</span>
        </div>
        <div class="menu-item" data-panel="contacts">
          <i class="fas fa-address-book"></i>
          <span>联系人</span>
        </div>
        <div class="menu-item" data-panel="templates">
          <i class="fas fa-file-alt"></i>
          <span>模板</span>
        </div>
        <div class="menu-item" data-panel="logs">
          <i class="fas fa-history"></i>
          <span>发送日志</span>
        </div>
        <div class="menu-item" data-panel="settings">
          <i class="fas fa-cog"></i>
          <span>设置</span>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="menu-item" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i>
          <span>退出登录</span>
        </div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="topbar">
        <h1 class="topbar-title" id="pageTitle">写信</h1>
        <div class="topbar-actions">
          <span id="userEmail" style="color: var(--text-secondary);"></span>
        </div>
      </header>

      <!-- 内容区域 -->
      <div class="content-area">
        <!-- 写信面板 -->
        <div id="composePanel" class="panel active">
          <div class="editor-container">
            <div class="editor-toolbar">
              <input type="text" id="emailSubject" class="form-input" placeholder="邮件主题" style="flex: 1;">
              <button class="btn btn-secondary" onclick="openTemplatesModal()">
                <i class="fas fa-folder-open"></i> 加载模板
              </button>
              <button class="btn btn-secondary" onclick="saveAsTemplate()">
                <i class="fas fa-save"></i> 保存模板
              </button>
              <button class="btn btn-primary" onclick="openSendModal()">
                <i class="fas fa-paper-plane"></i> 发送邮件
              </button>
            </div>
            <div class="editor-content">
              <div id="editor"></div>
            </div>
          </div>
        </div>

        <!-- 联系人面板 -->
        <div id="contactsPanel" class="panel">
          <div class="card">
            <div class="card-header">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>联系人管理</span>
                <div style="display: flex; gap: 8px;">
                  <button class="btn btn-sm btn-primary" onclick="openContactModal()">
                    <i class="fas fa-plus"></i> 添加联系人
                  </button>
                  <button class="btn btn-sm btn-secondary" onclick="importCSV()">
                    <i class="fas fa-file-import"></i> 导入CSV
                  </button>
                  <button class="btn btn-sm btn-secondary" onclick="exportCSV()">
                    <i class="fas fa-file-export"></i> 导出CSV
                  </button>
                </div>
              </div>
            </div>
            <div class="card-body">
              <div class="form-group">
                <input type="text" id="contactSearch" class="form-input" placeholder="搜索联系人..." oninput="searchContacts()">
              </div>
              <div class="table-container">
                <table class="table" id="contactsTable">
                  <thead>
                    <tr>
                      <th>姓名</th>
                      <th>邮箱</th>
                      <th>分组</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="contactsTableBody">
                    <tr>
                      <td colspan="4" style="text-align: center; color: var(--text-secondary);">加载中...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <!-- 模板面板 -->
        <div id="templatesPanel" class="panel">
          <div class="card">
            <div class="card-header">
              <span>邮件模板</span>
            </div>
            <div class="card-body">
              <p style="color: var(--text-secondary); margin-bottom: 16px;">
                <i class="fas fa-info-circle"></i> 
                提示：在"写信"页面编辑好内容后，点击"保存模板"按钮即可创建新模板
              </p>
              <div class="templates-list" id="templatesList">
                <p style="text-align: center; color: var(--text-secondary);">加载中...</p>
              </div>
            </div>
          </div>
        </div>

        <!-- 发送日志面板 -->
        <div id="logsPanel" class="panel">
          <div class="card">
            <div class="card-header">发送日志</div>
            <div class="card-body">
              <div class="table-container">
                <table class="table" id="logsTable">
                  <thead>
                    <tr>
                      <th>收件人</th>
                      <th>主题</th>
                      <th>状态</th>
                      <th>发送时间</th>
                    </tr>
                  </thead>
                  <tbody id="logsTableBody">
                    <tr>
                      <td colspan="4" style="text-align: center; color: var(--text-secondary);">暂无日志</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <!-- 设置面板 -->
        <div id="settingsPanel" class="panel">
          <div class="card">
            <div class="card-header">阿里云配置</div>
            <div class="card-body">
              <form id="configForm" class="config-form">
                <div class="form-group">
                  <label class="form-label">
                    <i class="fas fa-key"></i> AccessKey ID
                  </label>
                  <input type="text" id="accessKeyId" class="form-input" placeholder="请输入AccessKey ID" required>
                </div>

                <div class="form-group">
                  <label class="form-label">
                    <i class="fas fa-lock"></i> AccessKey Secret
                  </label>
                  <div class="password-input-wrapper">
                    <input type="password" id="accessKeySecret" class="form-input" placeholder="请输入AccessKey Secret" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('accessKeySecret')">
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label">
                    <i class="fas fa-globe"></i> 区域
                  </label>
                  <select id="region" class="form-select">
                    <option value="cn-hangzhou">华东1（杭州）</option>
                    <option value="ap-southeast-1">亚太东南1（新加坡）</option>
                  </select>
                </div>

                <div class="form-group">
                  <label class="form-label">
                    <i class="fas fa-envelope"></i> 发信地址
                  </label>
                  <input type="email" id="fromAddress" class="form-input" placeholder="例如: noreply@yourdomain.com" required>
                  <p class="form-hint">需要在阿里云DirectMail中验证过的发信地址</p>
                </div>

                <div class="form-group">
                  <label class="form-label">
                    <i class="fas fa-user"></i> 发件人昵称
                  </label>
                  <input type="text" id="fromAlias" class="form-input" placeholder="例如: Flydata系统">
                </div>

                <div style="display: flex; gap: 12px;">
                  <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> 保存配置
                  </button>
                  <button type="button" class="btn btn-secondary" onclick="testConnection()">
                    <i class="fas fa-plug"></i> 测试连接
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="csvFileInput" accept=".csv" style="display: none;" onchange="handleCSVFile(event)">

  <!-- 引入依赖库 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>

  <!-- 引入自定义脚本 -->
  <script src="js/supabase-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/contacts.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/mailer.js"></script>
  <script src="js/queue.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
